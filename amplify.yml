version: 1
backend:
  phases:
    build:
      commands:
        - "# Deploy the Amplify Gen2 backend (ampx)"
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - node -v
        # No `npm ci` here: the backend phase above already installed dependencies
        # in the same build container, so a second install is pure overhead.
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      # `npm ci` deletes node_modules and reinstalls from scratch, so caching it
      # is wasted save/restore time. Cache npm's download cache instead — the
      # backend phase's `--cache .npm --prefer-offline` actually reads from it.
      - .npm/**/*
